[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "pip install --no-cache-dir --upgrade pip",
  "pip install --no-cache-dir -r requirements.txt"
]

[start]
cmd = "uvicorn travel_brain.api.app:app --host 0.0.0.0 --port $PORT"

[variables]
PYTHONUNBUFFERED = "1"
EMBEDDING_PROVIDER = "gemini"
