services:
  - type: web
    name: travelbrain-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn travel_brain.api.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
